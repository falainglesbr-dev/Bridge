<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Reset e Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000000; 
            font-family: 'Poppins', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }

        /* Container de Login */
        .login-box {
            background: rgba(20, 20, 20, 0.95);
            border-radius: 24px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(194, 0, 0, 0.3);
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            text-align: center;
            transition: transform 0.3s ease;
        }

        h2 { 
            color: #c20000; 
            font-size: 1.5rem; 
            margin-bottom: 25px; 
            font-weight: 600; 
            letter-spacing: 1px;
        }

        /* Inputs */
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #c20000;
            box-shadow: 0 0 0 2px rgba(194, 0, 0, 0.2);
            background: #222;
        }

        /* Botão */
        .btn-login {
            background-color: #c20000;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            margin-top: 15px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background-color: #a00000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(194, 0, 0, 0.3);
        }

        .btn-login:disabled {
            background-color: #555;
            cursor: not-allowed;
            transform: none;
        }

        /* Feedback */
        #error-msg {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 15px;
            display: none;
            min-height: 20px;
        }

        .loader {
            display: none;
            margin: 15px auto;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #c20000;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>BRIDGE</h2>
        <input type="text" id="token" placeholder="Seu Token" spellcheck="false">
        <input type="password" id="senha" placeholder="Sua Senha">
        
        <div id="loader" class="loader"></div>
        <button class="btn-login" id="btn-entrar" onclick="tentarLogin()">Entrar</button>
        
        <p id="error-msg"></p>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwlmjq6VICkQchHjyohPdYoUi-Geo2h1OAkathQXsUC7FXmUiW2F_ZX9QsSfxC68D-m/exec";

        async function tentarLogin() {
            const tokenInput = document.getElementById('token').value.trim();
            const senhaInput = document.getElementById('senha').value.trim();
            const btn = document.getElementById('btn-entrar');
            const loader = document.getElementById('loader');
            const errorMsg = document.getElementById('error-msg');

            // Validação simples
            if (!tokenInput || !senhaInput) {
                mostrarErro("Por favor, preencha todos os campos.");
                return;
            }

            // UI State - Loading
            btn.disabled = true;
            loader.style.display = 'block';
            errorMsg.style.display = 'none';

            try {
                // Requisição para a API Universal
                const response = await fetch(`${API_URL}?action=login&token=${tokenInput}&senha=${senhaInput}`);
                
                if (!response.ok) throw new Error("Erro na resposta do servidor.");
                
                const data = await response.json();

                if (data.success) {
                    // Salva sessão no navegador (limpa ao fechar aba)
                    sessionStorage.setItem('bridge_token', data.token);
                    sessionStorage.setItem('bridge_nome', data.nome);
                    
                    // Redireciona para Dashboard
                    window.location.href = "dashboard.html";
                } else {
                    mostrarErro(data.message || "Token ou senha inválidos.");
                    resetarInterface();
                }

            } catch (error) {
                console.error("Erro de Login:", error);
                mostrarErro("Falha na conexão. Tente novamente em instantes.");
                resetarInterface();
            }
        }

        function mostrarErro(msg) {
            const errorMsg = document.getElementById('error-msg');
            errorMsg.innerText = msg;
            errorMsg.style.display = 'block';
        }

        function resetarInterface() {
            document.getElementById('btn-entrar').disabled = false;
            document.getElementById('loader').style.display = 'none';
        }

        // Permitir Enter para logar
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                tentarLogin();
            }
        });
    </script>
</body>
</html>
