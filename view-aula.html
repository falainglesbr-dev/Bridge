<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red: #c20000;
            --bg: #000000;
            --card-bg: #121212;
            --border: #333;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text-main); }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .btn-back { text-decoration: none; color: var(--text-dim); font-size: 24px; transition: color 0.3s; }
        .btn-back:hover { color: var(--red); }

        h2 { font-size: 1.4rem; font-weight: 600; }
        h2 span { color: var(--red); }

        .aula-layout { 
            display: flex; 
            gap: 25px; 
            align-items: flex-start;
        }

        .main-info { width: 70%; }
        .side-actions { width: 30%; display: flex; flex-direction: column; gap: 12px; }

        .aula-content { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 20px;
        }
        
        .meta-info { color: var(--text-dim); font-size: 13px; margin-bottom: 15px; display: block; }
        .descricao { font-size: 15px; line-height: 1.6; color: #ddd; margin-bottom: 25px; white-space: pre-wrap; }

        .text-block {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .text-block h4 {
            color: var(--red);
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .text-block p {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.5;
        }

        #homework-section { 
            background: rgba(194, 0, 0, 0.05); 
            border-left: 4px solid var(--red); 
            padding: 15px; 
            margin-top: 25px;
            display: none; 
            border-radius: 4px;
        }
        #homework-section b { color: var(--red); display: block; margin-bottom: 5px; font-size: 12px; }

        .btn-action { 
            display: none;
            text-align: center;
            padding: 18px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s;
            width: 100%;
        }
        
        .btn-video { background: var(--red); color: white; border: none; }
        .btn-video:hover { background: #a00000; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(194, 0, 0, 0.3); }

        .btn-more { background: transparent; color: white; border: 1px solid var(--border); }
        .btn-more:hover { border-color: var(--red); color: var(--red); transform: translateY(-3px); }

        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--red); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .aula-layout { flex-direction: column; }
            .main-info, .side-actions { width: 100%; }
            .side-actions { order: -1; }
        }
    </style>
</head>
<body onload="carregarDetalhesAula()">

<div class="container">
    <header>
        <a href="aulas.html" class="btn-back">←</a>
        <h2 id="titulo-aula">Carregando...</h2>
    </header>

    <div id="loader" class="loader"></div>

    <div id="main-content" style="display:none;">
        <div class="aula-layout">
            
            <div class="main-info">
                <div class="aula-content">
                    <small class="meta-info" id="data-aula"></small>
                    <p class="descricao" id="desc-aula"></p>

                    <div id="material-block" class="text-block" style="display:none;">
                        <h4>Material de Apoio</h4>
                        <p id="txt-material"></p>
                    </div>

                    <div id="anotacoes-block" class="text-block" style="display:none;">
                        <h4>Minhas Anotações</h4>
                        <p id="txt-anotacoes"></p>
                    </div>

                    <div id="homework-section">
                        <b>HOMEWORK / TASK:</b>
                        <p id="txt-homework" style="font-size: 14px;"></p>
                    </div>
                </div>
            </div>

            <div class="side-actions">
                <a href="#" id="link-video" target="_blank" class="btn-action btn-video">Reassistir</a>
                <a href="#" id="link-mais" target="_blank" class="btn-action btn-more">Guia de estudos</a>
            </div>

        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwoMQolodkRhFOUhC2HQRBqRedZioxXT33dOWLSLoNcYJEJ40C2zszh54Lp8xsxcxtmXA/exec";
    const token = sessionStorage.getItem('bridge_token');
    const senha = sessionStorage.getItem('bridge_senha');

    async function carregarDetalhesAula() {
        const urlParams = new URLSearchParams(window.location.search);
        const aulaId = urlParams.get('id');

        if (!token || !senha || !aulaId) { window.location.href = "index.html"; return; }

        try {
            // Requisição enviando token e senha para validação no Apps Script
            const response = await fetch(`${API_URL}?action=getDados&token=${token}&senha=${senha}`);
            const data = await response.json();

            if (data.success) {
                const aula = data.db.aulas.find(a => a.aula === decodeURIComponent(aulaId));
                
                if (aula) {
                    document.getElementById('titulo-aula').innerHTML = `Aula: <span>${aula.aula}</span>`;
                    document.getElementById('data-aula').innerText = aula.data || "DATA NÃO INFORMADA";
                    document.getElementById('desc-aula').innerText = aula.descricao || "Sem descrição disponível.";

                    if (aula.material && aula.material.trim() !== "") {
                        document.getElementById('material-block').style.display = 'block';
                        document.getElementById('txt-material').innerText = aula.material;
                    }

                    if (aula.anotacoes_aluno && aula.anotacoes_aluno.trim() !== "") {
                        document.getElementById('anotacoes-block').style.display = 'block';
                        document.getElementById('txt-anotacoes').innerText = aula.anotacoes_aluno;
                    }

                    if (aula.homework && aula.homework.trim() !== "" && !aula.homework.includes('http')) {
                        document.getElementById('homework-section').style.display = 'block';
                        document.getElementById('txt-homework').innerText = aula.homework;
                    }

                    // Botão de Vídeo
                    const btnVideo = document.getElementById('link-video');
                    if (aula.assistir && aula.assistir.toString().startsWith('http')) {
                        btnVideo.href = aula.assistir;
                        btnVideo.style.display = 'block';
                    }

                    // Botão Estude Mais (coluna 'mais')
                    const btnMais = document.getElementById('link-mais');
                    if (aula.mais && aula.mais.toString().startsWith('http')) {
                        btnMais.href = aula.mais;
                        btnMais.style.display = 'block';
                    }

                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                } else {
                    // Aula não encontrada
                    window.location.href = "aulas.html";
                }
            } else {
                // Erro de autenticação/senha na API
                window.location.href = "index.html";
            }
        } catch (error) {
            console.error("Erro:", error);
            window.location.href = "aulas.html";
        }
    }
</script>
</body>
</html>
